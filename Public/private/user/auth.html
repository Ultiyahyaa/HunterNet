<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HunterNet Authentication</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/user/auth.css">
</head>

<body>

<div class="auth-box">

    <h1>Anonymous Liberty</h1>

    <div class="subtitle">
        Secure Authentication Gateway
    </div>

    <div class="terminal-text cursor">
        Connecting to encrypted node
    </div>

    <!-- TOGGLE BUTTONS -->

    <div class="switch-buttons">

        <button id="showLogin">
            Login
        </button>

        <button id="showRegister">
            Register
        </button>

    </div>

    <!-- LOGIN FORM -->

    <div id="loginContainer">

        <h2>Login</h2>

        <form id="loginForm">

            <input
                type="text"
                id="loginUsername"
                placeholder="Username"
                required
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
            >

            <button type="submit">
                ACCESS NETWORK
            </button>
            <button type="button" id="loginReturnBtn">
                 RETURN TO PUBLIC SITE
            </button>
        </form>

    </div>

    <!-- REGISTER FORM -->

    <div id="registerContainer" style="display:none;">

        <h2>Register</h2>

        <form id="registerForm">

            <input
                type="text"
                id="registerUsername"
                placeholder="Username"
                required
            >

            <input
                type="password"
                id="registerPassword"
                placeholder="Password"
                required
            >

            <button type="submit">
                CREATE ACCOUNT
            </button>
            <button type="button" id="registerReturnBtn">
                 RETURN TO PUBLIC SITE
            </button>

        </form>

    </div>

</div>

<script src="/js/user/auth.js"></script>

</body>
</html>
