<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HunterNet Authentication</title>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin/auth.css">
</head>

<body>

<div class="auth-box">

    <h1>HunterNet Administrator</h1>

    <div class="subtitle">
        Secure Authentication Gateway
    </div>

    <div class="terminal-text cursor">
        Connecting to super-encrypted node
    </div>

    <h2>Login</h2>

    <form id="loginForm">

        <input
                type="text"
                id="loginUsername"
                placeholder="Username"
                required
        >

        <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
        >

        <button type="submit">
            ACCESS ADMINISTRATIVE NETWORK
        </button>
        <button type="button" onclick="window.location.href='/dashboard'">
            RETURN TO HUNTERNET DASHBOARD
        </button>
    </form>
    <script src="/js/admin/auth.js"></script>

</body>
</html>
