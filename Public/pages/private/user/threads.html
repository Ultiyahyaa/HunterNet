<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HunterNet Threads</title>

    <link rel="stylesheet" href="/css/user/threads.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo" onclick="window.location.href='/dashboard'">
        HunterNet
    </div>

    <button id="logoutBtn" class="logout-btn">
        LOG OUT
    </button>

</div>

<!-- MAIN LAYOUT -->
<div class="threads-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="sidebar-section">

            <h2>Threads Feed</h2>

            <div id="globalChat" class="thread-item" onclick="window.location.href='/threads'">
                # Threads Feed
            </div>

        </div>

        <div class="sidebar-section">

            <h2>Joined Threads</h2>

            <div id="joinedThreadsList" class="threads-list"></div>

        </div>

        <div class="sidebar-section">

            <h2>Users Online</h2>

            <div id="onlineUsers"></div>

        </div>

    </div>


    <!-- MAIN -->
    <div class="threads-container">



    </div>
</div>

<template id="threadsFeedTemplate">
    <div class="threads-feed">
        <div class="threads-header">

            <div>
                <h2 id="threadTitleView"># Threads</h2>

                <p class="thread-description">
                    Secure discussion threads and classified message channels.
                </p>
            </div>
        </div>

        <!-- CREATE THREAD PANEL -->
        <div class="create-post-panel">

            <input
                    type="text"
                    id="threadTitle"
                    placeholder="Thread title..."
                    maxlength="80"
            >

            <textarea
                    id="threadContent"
                    placeholder="Write thread content..."
                    maxlength="5000"
            ></textarea>

            <div class="create-post-footer">

                <div class="post-meta">
                    STATUS: ENCRYPTED CHANNEL
                </div>

                <!-- FIXED ID -->
                <button id="submitThreadBtn">
                    CREATE
                </button>

            </div>

        </div>

        <!-- FEED -->
        <div id="threadsFeed" class="posts-feed"></div>
    </div>
</template>

<template id="threadRoomTemplate">
    <!-- CHAT -->
    <div class="chat-container">

        <div class="chat-header">
            <div>
                <h2 id="chatTitle"></h2>
            </div>

            <div class="chat-header-actions">
                <button id="backBtn" class="chat-options">
                    ← BACK
                </button>

                <button id="pinsBtn" class="chat-options">
                    PINS
                </button>
            </div>

        </div>

        <div id="messages" class="messages"></div>

        <form id="messageForm" class="message-form">

            <!-- IMAGE PREVIEW -->
            <div
                    id="attachmentPreview"
                    class="attachment-preview hidden">
            </div>

            <div class="message-input-row">

                <!-- HIDDEN FILE INPUT -->
                <input
                        type="file"
                        id="imageInput"
                        accept="image/*"
                        multiple
                        hidden
                >

                <!-- ATTACH BUTTON -->
                <button
                        type="button"
                        id="attachBtn"
                        class="attach-btn">
                    +
                </button>

                <!-- MESSAGE INPUT -->
                <input
                        type="text"
                        id="messageInput"
                        placeholder="Enter transmission..."
                >

                <!-- SEND -->
                <button type="submit" id="submitBtn">
                    SEND
                </button>

            </div>

        </form>

    </div>
</template>

<script src="/socket.io/socket.io.js"></script>
<script type="module" src="/js/user/threads.js"></script>

</body>
</html>
